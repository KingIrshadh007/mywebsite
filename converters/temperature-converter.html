<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temperature Converter - Free Tools Hub</title>

<meta name="description" content="Convert Celsius, Fahrenheit and Kelvin instantly.">

<link rel="stylesheet" href="../css/style.css">

    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-M44W320Y1K"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-M44W320Y1K');
</script>
    
</head>
<body>

<header>
<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>🌡️ Temperature Converter</h1>

<div class="description">
Convert temperatures between Celsius, Fahrenheit and Kelvin.
</div>

<label>Temperature</label>

<input
type="number"
id="temperatureValue"
placeholder="Enter value">

<label>From</label>

<select id="fromTemp">
    <option value="C">Celsius</option>
    <option value="F">Fahrenheit</option>
    <option value="K">Kelvin</option>
</select>

<label>To</label>

<select id="toTemp">
    <option value="F">Fahrenheit</option>
    <option value="C">Celsius</option>
    <option value="K">Kelvin</option>
</select>

<button
class="action-btn"
onclick="convertTemperature()">
Convert
</button>

<div
class="result-box"
id="temperatureResult">
Result will appear here.
</div>

<h2>Supported Conversions</h2>

<ul>
<li>Celsius ⇄ Fahrenheit</li>
<li>Celsius ⇄ Kelvin</li>
<li>Fahrenheit ⇄ Kelvin</li>
</ul>

</div>

</main>

<script src="../js/temperature-converter.js"></script>
<script src="../js/theme.js"></script>

</body>
</html>
