<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Converter - Free Tools Hub</title>

<meta name="description" content="Convert HEX colors to RGB and RGB to HEX instantly.">

<link rel="stylesheet" href="../css/style.css">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-M44W320Y1K"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-M44W320Y1K');
</script>
  
</head>
<body>

<header>
<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>🎨 Color Converter</h1>

<div class="description">
Convert HEX colors to RGB and RGB colors to HEX.
</div>

<label>HEX Color</label>

<input
type="text"
id="hexInput"
placeholder="#FF0000">

<button
class="action-btn"
onclick="hexToRgb()">
HEX → RGB
</button>

<hr style="margin:20px 0;">

<label>RGB Color</label>

<input
type="number"
id="red"
placeholder="Red">

<input
type="number"
id="green"
placeholder="Green">

<input
type="number"
id="blue"
placeholder="Blue">

<button
class="action-btn"
onclick="rgbToHex()">
RGB → HEX
</button>

<div
class="result-box"
id="colorResult">
Result will appear here.
</div>

</div>

</main>

<script src="../js/color-converter.js"></script>
<script src="../js/theme.js"></script>

</body>
</html>
