<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Currency Converter - Free Tools Hub</title>

<meta name="description" content="Convert currencies instantly using live exchange rates.">

<link rel="stylesheet" href="../css/style.css">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-M44W320Y1K"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-M44W320Y1K');
</script>
    
</head>
<body>

<header>
<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>💱 Currency Converter</h1>

<div class="description">
Convert currencies using real-time exchange rates.
</div>

<label>Amount</label>
<input
type="number"
id="currencyAmount"
placeholder="Enter amount">

<label>From Currency</label>
<select id="fromCurrency">
<option value="USD">USD - US Dollar</option>
<option value="INR">INR - Indian Rupee</option>
<option value="EUR">EUR - Euro</option>
<option value="GBP">GBP - British Pound</option>
<option value="AED">AED - UAE Dirham</option>
<option value="JPY">JPY - Japanese Yen</option>
<option value="AUD">AUD - Australian Dollar</option>
<option value="CAD">CAD - Canadian Dollar</option>
</select>

<label>To Currency</label>
<select id="toCurrency">
<option value="INR">INR - Indian Rupee</option>
<option value="USD">USD - US Dollar</option>
<option value="EUR">EUR - Euro</option>
<option value="GBP">GBP - British Pound</option>
<option value="AED">AED - UAE Dirham</option>
<option value="JPY">JPY - Japanese Yen</option>
<option value="AUD">AUD - Australian Dollar</option>
<option value="CAD">CAD - Canadian Dollar</option>
</select>

<button
class="action-btn"
onclick="convertCurrency()">
Convert
</button>

<div
class="result-box"
id="currencyResult">
Result will appear here.
</div>

<p id="rateTime"></p>

<h2>About Currency Converter</h2>

<p>
Get real-time exchange rates and convert currencies instantly.
Rates are updated automatically using API.
</p>

</div>

</main>

<script>

async function convertCurrency() {

    const amount =
    parseFloat(
        document.getElementById("currencyAmount").value
    );

    const from =
    document.getElementById("fromCurrency").value;

    const to =
    document.getElementById("toCurrency").value;

    const result =
    document.getElementById("currencyResult");

    if (!amount || amount <= 0) {

        result.innerHTML =
        "Please enter a valid amount.";

        return;
    }

    result.innerHTML =
    "Fetching live exchange rate...";

    try {

        const response =
        await fetch(
        `https://open.er-api.com/v6/latest/${from}`
        );

        const data =
        await response.json();

        if (data.result !== "success") {

            result.innerHTML =
            "Unable to fetch exchange rates.";

            return;
        }

        const rate =
        data.rates[to];

        const converted =
        (amount * rate).toFixed(2);

        result.innerHTML = `
        <strong>${amount} ${from}
        = ${converted} ${to}</strong>

        <br><br>

        Exchange Rate:<br>

        1 ${from} = ${rate.toFixed(4)} ${to}

        <br><br>

        Updated:<br>

        ${new Date(data.time_last_update_utc).toLocaleString()}
        `;

    }

    catch(error){

        result.innerHTML =
        "Unable to fetch live exchange rates. Please try again.";

    }

}

</script>
<script src="../js/theme.js"></script>

</body>
</html>
