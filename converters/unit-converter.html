<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unit Converter - Free Tools Hub</title>

<meta name="description" content="Convert length, weight and temperature units instantly.">

<link rel="stylesheet" href="../css/style.css">

    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-M44W320Y1K"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-M44W320Y1K');
</script>
    
</head>
<body>

<header>
<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>🔄 Unit Converter</h1>

<div class="description">
Convert between common measurement units instantly.
</div>

<label>Conversion Type</label>

<select id="conversionType">
    <option value="length">Length</option>
    <option value="weight">Weight</option>
</select>

<label>Value</label>

<input
type="number"
id="converterValue"
placeholder="Enter value">

<button
class="action-btn"
onclick="convertUnit()">
Convert
</button>

<div
class="result-box"
id="converterResult">
Result will appear here.
</div>

<h2>Supported Conversions</h2>

<ul>
<li>Kilometers ⇄ Miles</li>
<li>Kilograms ⇄ Pounds</li>
</ul>

</div>

</main>

<script src="../js/unit-converter.js"></script>
<script src="../js/theme.js"></script>

</body>
</html>
