<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unit Converter - Free Tools Hub</title>

<meta name="description" content="Convert length, weight and temperature units instantly.">

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>🔄 Unit Converter</h1>

<div class="description">
Convert between common measurement units instantly.
</div>

<label>Conversion Type</label>

<select id="conversionType">
    <option value="length">Length</option>
    <option value="weight">Weight</option>
</select>

<label>Value</label>

<input
type="number"
id="converterValue"
placeholder="Enter value">

<button
class="action-btn"
onclick="convertUnit()">
Convert
</button>

<div
class="result-box"
id="converterResult">
Result will appear here.
</div>

<h2>Supported Conversions</h2>

<ul>
<li>Kilometers ⇄ Miles</li>
<li>Kilograms ⇄ Pounds</li>
</ul>

</div>

</main>

<script src="../js/unit-converter.js"></script>

</body>
</html>
