<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Counter - Free Tools Hub</title>

<meta name="description" content="Count words, characters, sentences and paragraphs instantly.">

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>📝 Word Counter</h1>

<div class="description">
Count words, characters, sentences and paragraphs instantly.
</div>

<label>Enter Text</label>

<textarea
id="wordCounterText"
rows="12"
placeholder="Type or paste text here..."></textarea>

<button
class="action-btn"
onclick="countWords()">
Count
</button>

<div
class="result-box"
id="wordCounterResult">
Results will appear here.
</div>

<h2>What is a Word Counter?</h2>

<p>
A word counter helps writers, students, bloggers and SEO professionals analyze text length and structure.
</p>

</div>

</main>

<script src="../js/word-counter.js"></script>

</body>
</html>
