<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meta Tag Generator - Free Tools Hub</title>

<meta name="description" content="Generate SEO meta tags instantly for your website.">

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>🏷️ Meta Tag Generator</h1>

<div class="description">
Generate SEO meta tags for your website instantly.
</div>

<label>Page Title</label>
<input type="text" id="metaTitle">

<label>Description</label>
<textarea id="metaDescription"></textarea>

<label>Keywords</label>
<input type="text" id="metaKeywords">

<button class="action-btn" onclick="generateMetaTags()">
Generate Meta Tags
</button>

<div class="result-box">
<textarea id="metaResult" rows="10" readonly></textarea>
</div>

<h2>What are Meta Tags?</h2>

<p>
Meta tags help search engines understand your webpage and improve SEO visibility.
</p>

</div>

</main>

<script src="../js/meta-tag-generator.js"></script>

</body>
</html>
