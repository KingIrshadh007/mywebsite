<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keyword Density Checker - Free Tools Hub</title>

<meta name="description" content="Check keyword density and frequency in your content instantly.">

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>🔍 Keyword Density Checker</h1>

<div class="description">
Analyze keyword frequency and density in your content.
</div>

<label>Content</label>
<textarea
id="keywordText"
rows="10"
placeholder="Paste your article here..."></textarea>

<label>Keyword</label>
<input
type="text"
id="keywordInput"
placeholder="Enter keyword">

<button
class="action-btn"
onclick="checkKeywordDensity()">
Check Density
</button>

<div
class="result-box"
id="keywordResult">
Result will appear here.
</div>

<h2>What is Keyword Density?</h2>

<p>
Keyword density is the percentage of times a keyword appears compared to the total number of words in a document.
</p>

</div>

</main>

<script src="../js/keyword-density-checker.js"></script>

</body>
</html>
