<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Open Graph Generator - Free Tools Hub</title>

<meta name="description" content="Generate Open Graph tags for Facebook, WhatsApp and social media sharing.">

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>📱 Open Graph Generator</h1>

<div class="description">
Generate Open Graph meta tags for social media sharing.
</div>

<label>Page Title</label>
<input type="text" id="ogTitle">

<label>Page Description</label>
<textarea id="ogDescription"></textarea>

<label>Page URL</label>
<input type="text" id="ogUrl">

<label>Image URL</label>
<input type="text" id="ogImage">

<button class="action-btn" onclick="generateOG()">
Generate Open Graph Tags
</button>

<div class="result-box">
<textarea id="ogResult" rows="12" readonly></textarea>
</div>

<h2>What are Open Graph Tags?</h2>

<p>
Open Graph tags control how your website appears when shared on Facebook, WhatsApp, LinkedIn and other social platforms.
</p>

</div>

</main>

<script src="../js/open-graph-generator.js"></script>

</body>
</html>
