<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sitemap Generator - Free Tools Hub</title>

<meta name="description" content="Generate XML sitemaps instantly for your website.">

<link rel="stylesheet" href="../css/style.css">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-M44W320Y1K"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-M44W320Y1K');
</script>
  
</head>
<body>

<header>
<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>🗺️ Sitemap Generator</h1>

<div class="description">
Generate a basic XML sitemap for your website.
</div>

<div class="input-group">

<label>Website URL</label>

<input
type="text"
id="siteUrl"
placeholder="https://example.com">

</div>

<button class="action-btn" onclick="generateSitemap()">
Generate Sitemap
</button>

<div class="result-box">

<textarea
id="sitemapResult"
class="meta-output"
readonly
placeholder="Generated XML sitemap will appear here..."
></textarea>

<button
class="copy-btn"
onclick="copySitemap()">

📋 Copy Sitemap

</button>

</div>

<h2>What is a Sitemap?</h2>

<p>
A sitemap helps search engines discover and index your website pages efficiently.
</p>

</div>

</main>

<script src="../js/sitemap-generator.js"></script>
<script>

function copySitemap(){

const text =
document.getElementById("sitemapResult");

if(text.value==="") return;

navigator.clipboard.writeText(text.value);

const btn =
document.querySelector(".copy-btn");

btn.innerHTML="✅ Copied!";

setTimeout(()=>{

btn.innerHTML="📋 Copy Sitemap";

},2000);

}

</script>
<script src="../js/theme.js"></script>
</body>
</html>
