<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sitemap Generator - Free Tools Hub</title>

<meta name="description" content="Generate XML sitemaps instantly for your website.">

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>🗺️ Sitemap Generator</h1>

<div class="description">
Generate a basic XML sitemap for your website.
</div>

<label>Website URL</label>
<input type="text" id="siteUrl" placeholder="https://example.com">

<button class="action-btn" onclick="generateSitemap()">
Generate Sitemap
</button>

<div class="result-box">
<textarea id="sitemapResult" rows="12" readonly></textarea>
</div>

<h2>What is a Sitemap?</h2>

<p>
A sitemap helps search engines discover and index your website pages efficiently.
</p>

</div>

</main>

<script src="../js/sitemap-generator.js"></script>

</body>
</html>
