<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Robots.txt Generator - Free Tools Hub</title>

<meta name="description" content="Generate robots.txt file for your website instantly.">

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>🤖 Robots.txt Generator</h1>

<div class="description">
Generate a robots.txt file to guide search engine crawlers.
</div>

<label>Website URL</label>
<input
type="text"
id="robotsUrl"
placeholder="https://example.com"
>

<button
class="action-btn"
onclick="generateRobots()">
Generate Robots.txt
</button>

<div class="result-box">
<textarea
id="robotsResult"
rows="12"
readonly></textarea>
</div>

<h2>What is Robots.txt?</h2>

<p>
A robots.txt file tells search engines which pages or folders they can crawl and index.
</p>

</div>

</main>

<script src="../js/robots-generator.js"></script>

</body>
</html>
