<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JavaScript Minifier - Free Tools Hub</title>

<meta name="description" content="Minify JavaScript code instantly by removing comments and extra spaces.">

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>⚡ JavaScript Minifier</h1>

<div class="description">
Reduce JavaScript file size by removing comments and unnecessary whitespace.
</div>

<label>JavaScript Code</label>

<textarea
id="jsInput"
rows="12"
placeholder="function hello(){ console.log('Hello'); }"></textarea>

<button
class="action-btn"
onclick="minifyJS()">
Minify JavaScript
</button>

<div class="result-box">

<textarea
id="jsResult"
rows="12"
readonly></textarea>

</div>

<h2>What is JavaScript Minification?</h2>

<p>
JavaScript minification removes unnecessary characters without changing functionality, improving page speed and reducing bandwidth usage.
</p>

</div>

</main>

<script src="../js/javascript-minifier.js"></script>

</body>
</html>
