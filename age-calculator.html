<div id="ageTool" class="tool-panel">

<h2>🎂 Age Calculator</h2>

<div class="description">
Calculate your exact age from your date of birth.
The calculator compares your birth date with today's date.
</div>

<label>Date of Birth</label>
<input type="date" id="ageDob">

<button class="action-btn" onclick="calculateAge()">
Calculate Age
</button>

<div class="result-box" id="ageResult">
Your result will appear here.
</div>

</div>
