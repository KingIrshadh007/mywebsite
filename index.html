<!DOCTYPE html>
<html>
<head>
  <title>Smart Downloader</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 70px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      width: 400px;
      margin: auto;
      border-radius: 10px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 95%;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    a {
      display: block;
      margin-top: 15px;
      color: #60a5fa;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>⚡ Smart Download Generator</h1>

<div class="box">

  <input id="url" placeholder="Paste direct file URL (mp4/mp3/pdf)">

  <button onclick="generate()">Generate Download Link</button>

  <p class="error" id="msg"></p>

  <a id="download" download></a>

</div>

<script>
function generate() {
  let url = document.getElementById("url").value;
  let msg = document.getElementById("msg");
  let link = document.getElementById("download");

  msg.innerText = "";
  link.innerText = "";

  if (!url) {
    msg.innerText = "Please enter a URL";
    return;
  }

  // simple check
  let allowed = url.includes(".mp4") || url.includes(".mp3") || url.includes(".pdf") || url.includes(".zip");

  if (!allowed) {
    msg.innerText = "❌ This URL is not a direct downloadable file";
    return;
  }

  let fileName = url.split("/").pop();

  link.href = url;
  link.download = fileName;
  link.innerText = "⬇ Click here to download file";
}
</script>

</body>
</html>
