<!DOCTYPE html>
<html>
<head>
  <title>Modern Tool Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      background: #334155;
      transform: scale(1.03);
    }

    .tool-box {
      display: none;
      padding: 20px;
      text-align: center;
    }

    input {
      width: 80%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 200px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    a {
      display: block;
      margin-top: 10px;
      color: #60a5fa;
    }
  </style>
</head>
<body>

<header>⚡ Modern Tool Hub</header>

<!-- HOME MENU -->
<div id="home" class="container">

  <div class="card" onclick="openTool('video')">🎬 Video Tools</div>
  <div class="card" onclick="openTool('text')">📝 Text Tools</div>
  <div class="card" onclick="openTool('download')">⬇ Downloader</div>

</div>

<!-- VIDEO TOOL -->
<div id="video" class="tool-box">
  <h2>Video Tool</h2>
  <input id="videoUrl" placeholder="Paste video URL">
  <button onclick="showVideo()">Play Video</button>
  <br><br>
  <video id="player" controls width="90%"></video>
  <br>
  <button onclick="back()">Back</button>
</div>

<!-- TEXT TOOL -->
<div id="text" class="tool-box">
  <h2>Text Converter</h2>
  <input id="txt" placeholder="Enter text">
  <button onclick="convert()">Convert</button>
  <p id="out"></p>
  <br>
  <button onclick="back()">Back</button>
</div>

<!-- DOWNLOADER TOOL -->
<div id="download" class="tool-box">
  <h2>Downloader</h2>
  <input id="dl" placeholder="Direct file URL">
  <button onclick="generate()">Generate Link</button>
  <p id="link"></p>
  <button onclick="back()">Back</button>
</div>

<script>
function openTool(id) {
  document.getElementById("home").style.display = "none";
  document.getElementById(id).style.display = "block";
}

function back() {
  document.getElementById("home").style.display = "grid";
  document.querySelectorAll(".tool-box").forEach(t => t.style.display = "none");
}

// Video tool
function showVideo() {
  let url = document.getElementById("videoUrl").value;
  document.getElementById("player").src = url;
}

// Text tool
function convert() {
  let t = document.getElementById("txt").value;
  document.getElementById("out").innerText = t.toUpperCase();
}

// Downloader tool
function generate() {
  let url = document.getElementById("dl").value;
  document.getElementById("link").innerHTML =
    `<a href="${url}" download>⬇ Download File</a>`;
}
</script>

</body>
</html>
