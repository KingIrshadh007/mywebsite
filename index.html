<!DOCTYPE html>
<html>
<head>
  <title>Fast File Downloader</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 80px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      width: 350px;
      margin: auto;
      border-radius: 10px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 95%;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    a {
      display: block;
      margin-top: 15px;
      color: #60a5fa;
    }
  </style>
</head>
<body>

<h1>⚡ Fast File Downloader</h1>

<div class="box">
  <input id="url" placeholder="Paste direct file URL (mp4/mp3/pdf)">
  <button onclick="downloadFile()">Generate Download</button>

  <a id="downloadLink" download>Download will appear here</a>
</div>

<script>
function downloadFile() {
  let url = document.getElementById("url").value;

  if (!url) {
    alert("Please enter a URL");
    return;
  }

  let link = document.getElementById("downloadLink");
  link.href = url;
  link.innerText = "Click here to download file";
}
</script>

</body>
</html>
