<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scientific Calculator - Free Tools Hub</title>

<meta name="description" content="Perform advanced mathematical calculations instantly.">

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
    <div class="logo">⚡ Free Tools Hub</div>

    <nav>
        <a href="../index.html">🏠 Home</a>
    </nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>🧮 Scientific Calculator</h1>

<div class="description">
Perform advanced calculations including trigonometry, logarithms, powers, roots and more.
</div>

<label>Expression</label>

<input
type="text"
id="scientificInput"
placeholder="Example: 5+5, Math.sqrt(25), Math.sin(1)"
>

<button class="action-btn" onclick="calculateScientific()">
Calculate
</button>

<div class="result-box" id="scientificResult">
Your result will appear here.
</div>

<h2>Examples</h2>

<ul>
<li>5+10</li>
<li>Math.sqrt(81)</li>
<li>Math.pow(2,5)</li>
<li>Math.sin(1)</li>
<li>Math.cos(1)</li>
<li>Math.log(100)</li>
</ul>

</div>

</main>

<script src="../js/scientific-calculator.js"></script>
<script src="../js/theme.js"></script>

</body>
</html>
