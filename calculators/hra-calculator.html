<!DOCTYPE html>

<body>

<header>
    <div class="logo">⚡ Free Tools Hub</div>

    <nav>
        <a href="../index.html">🏠 Home</a>
    </nav>
</header>

<main class="content">

<div class="tool-panel active">

<h1>🏠 HRA Calculator</h1>

<div class="description">
Calculate your House Rent Allowance (HRA) exemption.
</div>

<label>Basic Salary (₹)</label>
<input type="number" id="hraBasic">

<label>HRA Received (₹)</label>
<input type="number" id="hraReceived">

<label>Monthly Rent Paid (₹)</label>
<input type="number" id="hraRent">

<button class="action-btn" onclick="calculateHRA()">
Calculate HRA
</button>

<div class="result-box" id="hraResult">
Your result will appear here.
</div>

<h2>What is HRA?</h2>

<p>
House Rent Allowance (HRA) is a salary component provided by employers to help employees meet rental expenses.
</p>
