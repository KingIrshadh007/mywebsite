<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found | Free Tools Hub</title>

<meta name="description"
content="Oops! The page you are looking for could not be found.">

<link rel="stylesheet" href="css/style.css">

<style>

.error-page{

min-height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

position:relative;

overflow:hidden;

}

.error-page::before{

content:"";

position:absolute;

width:400px;

height:400px;

background:rgba(59,130,246,.15);

border-radius:50%;

filter:blur(100px);

top:-100px;

left:-100px;

animation:float1 10s infinite alternate;

}

.error-page::after{

content:"";

position:absolute;

width:350px;

height:350px;

background:rgba(6,182,212,.15);

border-radius:50%;

filter:blur(100px);

bottom:-100px;

right:-100px;

animation:float2 12s infinite alternate;

}

@keyframes float1{

0%{
transform:translateX(0);
}

100%{
transform:translateX(200px);
}

}

@keyframes float2{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-200px);
}

}

.error-code{

font-size:9rem;

font-weight:900;

background:linear-gradient(
90deg,
#60a5fa,
#06b6d4,
#8b5cf6
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

animation:pulse 2s infinite;

}

@keyframes pulse{

50%{
transform:scale(1.05);
}

}

.error-title{

font-size:2.2rem;

margin-top:20px;

}

.error-text{

max-width:600px;

margin-top:20px;

color:var(--text-light);

line-height:1.8;

}

.home-btn{

display:inline-block;

margin-top:40px;

padding:15px 35px;

border-radius:15px;

text-decoration:none;

font-weight:700;

background:linear-gradient(
135deg,
#3b82f6,
#06b6d4
);

color:white;

transition:.3s;

box-shadow:0 10px 25px rgba(59,130,246,.3);

}

.home-btn:hover{

transform:translateY(-4px);

}

</style>

</head>

<body>

<section class="error-page">

<div class="error-code">

404

</div>

<h1 class="error-title">

Oops! Page Not Found

</h1>

<p class="error-text">

The page you are trying to access doesn't exist,
may have been moved, or the URL may be incorrect.

Please return to the homepage and continue exploring our free tools.

</p>

<a href="index.html" class="home-btn">

🏠 Back To Home

</a>

</section>

</body>

</html>
