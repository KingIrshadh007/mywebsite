<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Number Generator - Free Tools Hub</title>

<meta name="description" content="Generate random numbers instantly within a custom range.">

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>

<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>

</header>

<main class="content">

<div class="tool-panel active">

<h1>🎲 Random Number Generator</h1>

<div class="description">
Generate one or multiple random numbers within a custom range.
</div>

<label>Minimum Value</label>

<input
type="number"
id="minNumber"
value="1">

<label>Maximum Value</label>

<input
type="number"
id="maxNumber"
value="100">

<label>How Many Numbers?</label>

<input
type="number"
id="numberCount"
value="1"
min="1"
max="100">

<button
class="action-btn"
onclick="generateRandomNumbers()">
Generate
</button>

<button
class="action-btn"
onclick="copyRandomNumbers()">
Copy
</button>

<div class="result-box">

<textarea
id="randomResult"
rows="10"
readonly></textarea>

</div>

<h2>Examples</h2>

<ul>
<li>1 to 100</li>
<li>1 to 1000</li>
<li>Lottery numbers</li>
<li>Lucky draw numbers</li>
</ul>

</div>

</main>

<script src="../js/random-number-generator.js"></script>
<script src="../js/theme.js"></script>

</body>
</html>
