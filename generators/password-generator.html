<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Generator - Free Tools Hub</title>

<meta name="description" content="Generate secure random passwords instantly.">

<link rel="stylesheet" href="../css/style.css">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-M44W320Y1K"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-M44W320Y1K');
</script>
 
</head>
<body>

<header>

<div class="logo">⚡ Free Tools Hub</div>

<nav>
<a href="../index.html">🏠 Home</a>
</nav>

</header>

<main class="content">

<div class="tool-panel active">

<h1>🔐 Password Generator</h1>

<div class="description">
Generate strong and secure passwords instantly.
</div>

<label>Password Length</label>

<input
type="number"
id="passwordLength"
value="12"
min="4"
max="64">

<div style="margin:15px 0;">

<label>
<input type="checkbox" id="uppercase" checked>
 Uppercase Letters
</label>

<br>

<label>
<input type="checkbox" id="lowercase" checked>
 Lowercase Letters
</label>

<br>

<label>
<input type="checkbox" id="numbers" checked>
 Numbers
</label>

<br>

<label>
<input type="checkbox" id="symbols" checked>
 Symbols
</label>

</div>

<button
class="action-btn"
onclick="generatePassword()">
Generate Password
</button>

<button
class="action-btn"
onclick="copyPassword()">
Copy Password
</button>

<div class="result-box">

<input
type="text"
id="passwordResult"
readonly
style="width:100%;">

</div>

</div>

</main>

<script src="../js/password-generator.js"></script>
 <script src="../js/theme.js"></script>

</body>
</html>
